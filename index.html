<!-- Amplitude Analytics + Session Replay. 번들러가 없는 정적 사이트라 문서의 @amplitude/unified
     SDK를 ESM CDN으로 로드한다. 전부 클라이언트 측에서만 실행되고 initAll은 로드 시 1회만 호출. -->
<script type="module">
  import * as amplitude from 'https://esm.sh/@amplitude/unified@1';
  // 이 게임은 부장님을 계속 탭/클릭해서 때리는 구조라 elementInteractions(클릭 자동수집)를 켜면

  amplitude.initAll('e7b4c9acd85ecd22aafe178a1e8bb701', {
    analytics: {
      autocapture: {
        pageViews: true,
        sessions: true,
        attribution: true,
        formInteractions: false,
        fileDownloads: false,
        elementInteractions: false
      }
    },
    sessionReplay: { sampleRate: 0.1 } // 세션의 10%만 녹화 (데이터 사용량 절감)
  });
  window.amplitude = amplitude;
  // Amplitude 로드 전에 쌓인 이벤트를 순서대로 흘려보낸다
  if (window.__ampFlush) window.__ampFlush();
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
  body {
    font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
    background: #14161f;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  /* 데스크탑에서도 모바일 프레임(최대 480px)으로 표시 */
  #app { height: 100%; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; box-shadow: 0 0 44px rgba(0,0,0,.6); }

  /* ── 탭 ── */
  /* 회사 폭파 게임은 추후 별도 개발 예정 — 탭 바 숨김 */
  #tabs {
    display: none; gap: 8px; padding: 10px 12px;
    background: #1b1e2b; z-index: 50;
  }
  .tab-btn {
    flex: 1; padding: 12px 8px; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 800; cursor: pointer;
    background: #262a3d; color: #8a90ad;
    transition: all .15s;
  }
  .tab-btn.active { background: #ff4757; color: #fff; box-shadow: 0 4px 14px rgba(255,71,87,.45); }

  .screen { flex: 1; position: relative; display: none; overflow: hidden; }
  .screen.active { display: block; }

  /* ═══════════ 게임 1: 사직서 던지기 ═══════════ */
  #throwScreen {
    background: linear-gradient(#2b3049 0%, #363c5c 55%, #23273a 55.2%, #1c1f30 100%);
  }

  #hud {
    position: absolute; top: 10px; left: 0; right: 0;
    display: flex; flex-wrap: wrap; justify-content: space-between; gap: 8px;
    padding: 0 10px; pointer-events: none; z-index: 20;
  }
  .hud-box { background: rgba(0,0,0,.35); border-radius: 12px; padding: 8px 12px; backdrop-filter: blur(4px); width: min(44%, 170px); text-align: center; }
  .hud-label { font-size: 11px; color: #9aa0c0; font-weight: 700; }
  .hud-val { font-size: 20px; font-weight: 900; color: #ffd83d; line-height: 1.1; }

  /* 부장님 멘탈 게이지: 명중/콤보 아래 줄에 중앙 배치, 데스크탑에선 최대 320px */
  #mentalWrap { flex-basis: 100%; max-width: 320px; margin: 0 auto; min-width: 0; }
  #mentalLabel { text-align: center; font-size: 11px; font-weight: 800; color: #cfd3ec; margin-bottom: 4px; text-shadow: 0 1px 3px rgba(0,0,0,.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #mentalBar { position: relative; height: 17px; background: rgba(0,0,0,.5); border-radius: 9px; overflow: hidden; border: 1px solid rgba(255,255,255,.2); }
  #mentalFill { height: 100%; width: 100%; border-radius: 9px; background: linear-gradient(90deg,#2ecc71,#f1c40f,#ff4757); transition: width .25s; }
  #mentalNum {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 900; color: #fff; letter-spacing: .5px;
    text-shadow: 0 1px 3px rgba(0,0,0,.9);
  }

  #bossWrap {
    position: absolute; left: 50%; top: 24%;
    transform: translateX(-50%);
    width: min(52vw, 260px);
    z-index: 5;
    transition: filter .2s;
  }
  #bossSvg { width: 100%; display: block; overflow: visible; }

  #bubble {
    position: absolute; left: 50%; top: calc(24% + 28px); /* 부장님 머리 바로 위 */
    transform: translate(-50%, -100%);
    background: #fff; color: #22253a;
    font-weight: 800; font-size: 14px;
    padding: 10px 14px; border-radius: 14px;
    max-width: min(78vw, 400px); text-align: center;
    opacity: 0; transition: opacity .2s;
    z-index: 30; pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
  }
  #bubble::after {
    content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
    border: 9px solid transparent; border-top-color: #fff; border-bottom: 0;
  }
  #bubble.show { opacity: 1; }

  /* 사직서 */
  #paper {
    position: absolute; width: 74px; height: 96px;
    z-index: 15; cursor: grab; will-change: transform;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,.5));
  }
  #paper:active { cursor: grabbing; }
  #paper svg { width: 100%; height: 100%; display: block; }

  #aimLine { position: absolute; inset: 0; z-index: 14; pointer-events: none; }

  #throwHint {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    color: #aab0d5; font-size: 13px; font-weight: 700; text-align: center;
    pointer-events: none; z-index: 10; animation: hintPulse 1.6s infinite;
    text-shadow: 0 2px 6px rgba(0,0,0,.7); width: min(90vw, 440px);
  }

  /* 하단 발사 구역: 사직서 아래 어디서든 잡고 스와이프 */
  #launchZone { position: absolute; left: 0; right: 0; top: 60%; bottom: 0; z-index: 12; cursor: grab; }
  @keyframes hintPulse { 0%,100%{opacity:.55} 50%{opacity:1} }

  /* 타격 텍스트 */
  .fx-text {
    position: absolute; z-index: 40; pointer-events: none;
    font-weight: 900; white-space: nowrap;
    transform: translate(-50%,-50%);
    animation: fxPop .9s forwards;
    text-shadow: 0 3px 0 rgba(0,0,0,.35);
  }
  @keyframes fxPop {
    0% { transform: translate(-50%,-50%) scale(.3); opacity: 0; }
    18% { transform: translate(-50%,-50%) scale(1.25); opacity: 1; }
    32% { transform: translate(-50%,-50%) scale(1); }
    75% { opacity: 1; }
    100% { transform: translate(-50%,-110%) scale(1); opacity: 0; }
  }
  .particle { position: absolute; z-index: 35; pointer-events: none; will-change: transform, opacity; }

  /* 무기 타격 연출 */
  #bossWrap { cursor: pointer; }
  #paperEmoji {
    display: none; width: 100%; height: 100%;
    align-items: center; justify-content: center;
    font-size: 56px; line-height: 1;
  }
  /* 볼펜: 정수리에 수직으로 꽂혀서 부들부들 */
  .stuck-pen { position: absolute; z-index: 36; font-size: 38px; pointer-events: none; animation: stuckWobble 1s forwards; }
  @keyframes stuckWobble {
    0%   { transform: translate(-50%, -94%) rotate(-62deg); opacity: 1; }
    14%  { transform: translate(-50%, -94%) rotate(-32deg); }
    30%  { transform: translate(-50%, -94%) rotate(-54deg); }
    46%  { transform: translate(-50%, -94%) rotate(-40deg); }
    62%  { transform: translate(-50%, -94%) rotate(-48deg); }
    82%  { transform: translate(-50%, -94%) rotate(-45deg); opacity: 1; }
    100% { transform: translate(-50%, -120%) rotate(-45deg); opacity: 0; }
  }

  /* 몽둥이: 오른쪽 → 왼쪽 풀스윙 */
  .swing-side {
    position: absolute; z-index: 38; pointer-events: none;
    font-size: 74px; line-height: 1;
    animation: swingSide .3s cubic-bezier(.4,.05,.2,1) forwards;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,.5));
  }
  @keyframes swingSide {
    0%   { transform: translate(calc(-50% + 130px), calc(-50% - 70px)) rotate(80deg) scale(1.05); opacity: 0; }
    22%  { transform: translate(calc(-50% + 95px), calc(-50% - 45px)) rotate(55deg) scale(1.1); opacity: 1; }
    50%  { transform: translate(-50%, -50%) rotate(-15deg) scale(1.2); opacity: 1; } /* 임팩트 */
    78%  { transform: translate(calc(-50% - 95px), calc(-50% - 40px)) rotate(-70deg) scale(1.1); opacity: 1; }
    100% { transform: translate(calc(-50% - 140px), calc(-50% - 75px)) rotate(-95deg) scale(1); opacity: 0; }
  }

  /* 키보드: 머리 위에서 휘둘러 내리찍는 스매시 */
  .swing-smash {
    position: absolute; z-index: 38; pointer-events: none;
    font-size: 68px; line-height: 1;
    animation: swingSmash .32s cubic-bezier(.5,.05,.3,1) forwards;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,.5));
  }
  @keyframes swingSmash {
    0%   { transform: translate(calc(-50% + 95px), calc(-50% - 150px)) rotate(65deg) scale(1); opacity: 0; }
    25%  { transform: translate(calc(-50% + 60px), calc(-50% - 105px)) rotate(40deg) scale(1.08); opacity: 1; }
    58%  { transform: translate(-50%, calc(-50% - 4px)) rotate(-8deg) scale(1.18); opacity: 1; } /* 임팩트 */
    72%  { transform: translate(calc(-50% - 5px), calc(-50% + 3px)) rotate(3deg) scale(1.1); }
    100% { transform: translate(calc(-50% - 14px), calc(-50% - 10px)) rotate(-6deg) scale(1); opacity: 0; }
  }
  /* 권총: 탄환 트레이서 */
  .tracer {
    position: absolute; height: 3px; border-radius: 2px;
    background: linear-gradient(90deg, rgba(255,216,61,.05), #ffd83d);
    transform-origin: 0 50%; z-index: 34; pointer-events: none;
    animation: tracerFade .16s forwards;
  }
  @keyframes tracerFade { to { opacity: 0; } }

  /* 화면 흔들림/플래시 */
  .shake-s { animation: shakeS .25s; }
  .shake-m { animation: shakeM .35s; }
  .shake-l { animation: shakeL .5s; }
  @keyframes shakeS { 0%,100%{transform:translate(0)} 25%{transform:translate(3px,-2px)} 50%{transform:translate(-3px,2px)} 75%{transform:translate(2px,1px)} }
  @keyframes shakeM { 0%,100%{transform:translate(0)} 20%{transform:translate(7px,-5px)} 40%{transform:translate(-7px,5px)} 60%{transform:translate(5px,3px)} 80%{transform:translate(-4px,-3px)} }
  @keyframes shakeL { 0%,100%{transform:translate(0)} 15%{transform:translate(12px,-9px) rotate(.6deg)} 30%{transform:translate(-12px,9px) rotate(-.6deg)} 45%{transform:translate(10px,6px)} 60%{transform:translate(-9px,-6px)} 75%{transform:translate(6px,4px)} 90%{transform:translate(-4px,-2px)} }

  #flash {
    position: absolute; inset: 0; z-index: 45; pointer-events: none;
    background: #fff; opacity: 0;
  }
  #flash.go { animation: flashGo .3s; }
  @keyframes flashGo { 0%{opacity:.7} 100%{opacity:0} }

  /* 상점 버튼: 명중 카운터와 구분되는 골드 버튼 (은은한 글로우로 시선 유도) */
  #shopBtn {
    pointer-events: auto; cursor: pointer; font-family: inherit;
    background: linear-gradient(145deg, #ffd23d, #ff9f2e);
    border: none;
    box-shadow: 0 3px 0 #b5680f, 0 6px 16px rgba(255,180,50,.4);
    animation: shopGlow 2s infinite;
  }
  #shopBtn:active {
    transform: translateY(2px) scale(.97);

  }
  #shopBtn .hud-label { color: #7a4a08; }
  #shopBtn .hud-val { font-size: 17px; color: #3a2404; }
  @keyframes shopGlow {
    0%, 100% { box-shadow: 0 3px 0 #b5680f, 0 6px 14px rgba(255,180,50,.35); }
    50%      { box-shadow: 0 3px 0 #b5680f, 0 6px 24px rgba(255,210,70,.75); }
  }
  #shopOverlay {

  /* 전국 타격 현황 버튼 (명중 카운터 대체): LIVE 점멸 점으로 실시간 집계임을 어필 */

<script>
'use strict';
/* ═══════════════════ 공통 유틸 ═══════════════════ */
const $ = s => document.querySelector(s);
const rand = (a, b) => a + Math.random() * (b - a);
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const fmt = n => n.toLocaleString('ko-KR');
const vibrate = ms => { try { navigator.vibrate && navigator.vibrate(ms); } catch (e) {} };

/* 전국 집계 공용 카운터 (counterapi.dev, 한국 시간 기준 일별 키) — 타격/폭파 공용 */
const STAT_API = 'https://api.counterapi.dev/v1/fired-quit-sim';
const kstDay = () => new Intl.DateTimeFormat('sv-SE', { timeZone: 'Asia/Seoul' }).format(new Date()).replace(/-/g, '');
async function apiCount(name, up = false) {
  // 읽기 경로는 끝 슬래시 필수: 없으면 301 리다이렉트가 CORS 헤더 없이 내려와 fetch가 실패함
  const res = await fetch(`${STAT_API}/${name}${up ? '/up' : '/'}`);
  // 아직 생성 안 된 카운터 조회는 400("record not found")로 내려온다 → 0으로 처리
  if (!res.ok) { if (res.status === 400 || res.status === 404) return 0; throw new Error('stat api ' + res.status); }
  return (await res.json()).count;
}

/* ═══════════════════ 이벤트 트래킹 ═══════════════════ */
/* Mixpanel(무료 플랜: 월 100만 이벤트, 커스텀 이벤트 지원)로 게임 이벤트를 집계한다.
   👉 아래 MIXPANEL_TOKEN 에 본인 프로젝트 토큰만 붙여넣으면 바로 켜진다.
   (Mixpanel → Settings → Project Settings → Project Token)
   토큰이 비어 있으면 트래킹은 조용히 비활성화되고, 게임은 그대로 동작한다.
   페이지뷰는 Vercel Web Analytics(무료)가 별도로 집계한다. */
const MIXPANEL_TOKEN = ''; // ← 여기에 Mixpanel 프로젝트 토큰 붙여넣기
const Track = (() => {
  let ready = false;
  const queue = [];
  if (MIXPANEL_TOKEN) {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/mixpanel-browser@2.55.1/dist/mixpanel.min.js';
    s.onload = () => {
      try {
        mixpanel.init(MIXPANEL_TOKEN, { track_pageview: true, persistence: 'localStorage' });
        ready = true;
        queue.splice(0).forEach(([n, p]) => { try { mixpanel.track(n, p); } catch (e) {} });
      } catch (e) {}
    };
    s.onerror = () => { queue.length = 0; };
    document.head.appendChild(s);
  }
  // Amplitude: 모듈 스크립트가 window.amplitude 를 세팅하기 전에 쌓인 이벤트를 큐잉했다가 flush
  const ampQueue = [];
  window.__ampFlush = () => {
    if (!window.amplitude) return;
    ampQueue.splice(0).forEach(([n, p]) => { try { window.amplitude.track(n, p); } catch (e) {} });
  };

  return (name, props = {}) => {
    // Mixpanel: 커스텀 이벤트 (준비 전이면 큐잉)
    if (MIXPANEL_TOKEN) {
      if (ready) { try { mixpanel.track(name, props); } catch (e) {} }
      else if (queue.length < 50) queue.push([name, props]);
    }
    // Amplitude: 커스텀 이벤트 (SDK 로드 전이면 큐잉)
    if (window.amplitude) { try { window.amplitude.track(name, props); } catch (e) {} }
    else if (ampQueue.length < 50) ampQueue.push([name, props]);
    // Vercel Web Analytics 커스텀 이벤트(Pro 전용이지만 호출은 무해)
    try { window.va && window.va('event', { name, data: props }); } catch (e) {}
  };
})();

/* ═══════════════════ 사운드 엔진 (Web Audio 합성) ═══════════════════ */
const SFX = (() => {
  let ctx = null;
  const ac = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  };
  // 노이즈 버퍼 (타격/폭발용)
  let noiseBuf = null;
  const noise = c => {
    if (!noiseBuf) {
      noiseBuf = c.createBuffer(1, c.sampleRate * 1.2, c.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    }
    const src = c.createBufferSource();
    src.buffer = noiseBuf;
    return src;
  };
  const env = (c, g, t, a, peak, dur) => {
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(peak, t + a);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  };

  return {
    unlock() { ac(); },
    // 휙~ 던지는 소리
    whoosh(power = 1) {
      const c = ac(), t = c.currentTime;
      const src = noise(c), f = c.createBiquadFilter(), g = c.createGain();
      f.type = 'bandpass'; f.Q.value = 1.2;
      f.frequency.setValueAtTime(400, t);
      f.frequency.exponentialRampToValueAtTime(2200 + power * 800, t + 0.18);
      env(c, g, t, 0.02, 0.25 * Math.min(power, 1.4), 0.25);
      src.connect(f).connect(g).connect(c.destination);
      src.start(t); src.stop(t + 0.3);
    },
    // 착! 타격음 (강도별)
    hit(power = 1) {
      const c = ac(), t = c.currentTime;
      // 찰싹 (노이즈 버스트)
      const n = noise(c), nf = c.createBiquadFilter(), ng = c.createGain();
      nf.type = 'lowpass';
      nf.frequency.setValueAtTime(3000 + power * 3000, t);
      nf.frequency.exponentialRampToValueAtTime(300, t + 0.12);
      env(c, ng, t, 0.004, 0.55 + power * 0.35, 0.13 + power * 0.06);
      n.connect(nf).connect(ng).connect(c.destination);
      n.start(t); n.stop(t + 0.25);
      // 퍽 (저음 바디)
      const o = c.createOscillator(), og = c.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(160 + power * 60, t);
      o.frequency.exponentialRampToValueAtTime(45, t + 0.14);
      env(c, og, t, 0.004, 0.7 + power * 0.4, 0.16);
      o.connect(og).connect(c.destination);
      o.start(t); o.stop(t + 0.2);
    },
    // 크리티컬! (타격 + 금속성 벨)
    crit() {
      SFX.hit(2);
      const c = ac(), t = c.currentTime;
      [880, 1320, 1760].forEach((fr, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = 'square';
        o.frequency.setValueAtTime(fr, t + i * 0.045);
        env(c, g, t + i * 0.045, 0.005, 0.12, 0.22);
        o.connect(g).connect(c.destination);
        o.start(t + i * 0.045); o.stop(t + i * 0.045 + 0.25);
      });
    },
    // 부장님 신음
    grunt(pitch = 1) {
      const c = ac(), t = c.currentTime;
      const o = c.createOscillator(), g = c.createGain(), f = c.createBiquadFilter();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(190 * pitch, t);
      o.frequency.exponentialRampToValueAtTime(90 * pitch, t + 0.22);
      f.type = 'lowpass'; f.frequency.value = 900;
      env(c, g, t, 0.02, 0.28, 0.26);
      o.connect(f).connect(g).connect(c.destination);
      o.start(t); o.stop(t + 0.3);
    },
    // 툭 (빗나감/바닥)
    thud() {
      const c = ac(), t = c.currentTime;
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(120, t);
      o.frequency.exponentialRampToValueAtTime(50, t + 0.08);
      env(c, g, t, 0.004, 0.35, 0.1);
      o.connect(g).connect(c.destination);
      o.start(t); o.stop(t + 0.12);
    },
    // 콤보 띠링
    combo(step = 0) {
      const c = ac(), t = c.currentTime;
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'triangle';
      o.frequency.value = 620 * Math.pow(1.13, Math.min(step, 10));
      env(c, g, t, 0.005, 0.22, 0.16);
      o.connect(g).connect(c.destination);
      o.start(t); o.stop(t + 0.18);
    },
    // 탕! 총성
    gunshot() {
      const c = ac(), t = c.currentTime;
      const n = noise(c), f = c.createBiquadFilter(), g = c.createGain();
      f.type = 'highpass'; f.frequency.value = 1100;
      env(c, g, t, 0.002, 0.75, 0.1);
      n.connect(f).connect(g).connect(c.destination);
      n.start(t); n.stop(t + 0.13);
      const o = c.createOscillator(), og = c.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(230, t);
      o.frequency.exponentialRampToValueAtTime(55, t + 0.09);
      env(c, og, t, 0.002, 0.55, 0.11);
      o.connect(og).connect(c.destination);
      o.start(t); o.stop(t + 0.13);
    },
    // 구매 짤랑~
    buy() {
      const c = ac(), t = c.currentTime;
      [660, 990, 1320].forEach((fr, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = 'triangle';
        o.frequency.value = fr;
        env(c, g, t + i * 0.07, 0.005, 0.2, 0.18);
        o.connect(g).connect(c.destination);
        o.start(t + i * 0.07); o.stop(t + i * 0.07 + 0.2);
      });
    },
    // KO 팡파레
    fanfare() {
      const c = ac(), t = c.currentTime;
      [523, 659, 784, 1046].forEach((fr, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = 'square';
        o.frequency.value = fr;
        env(c, g, t + i * 0.11, 0.01, 0.16, i === 3 ? 0.5 : 0.14);
        o.connect(g).connect(c.destination);
        o.start(t + i * 0.11); o.stop(t + i * 0.11 + 0.55);
      });
    },
    // 콰콰쾅 폭발
    explosion() {
      const c = ac(), t = c.currentTime;
      // 저음 붐
      const o = c.createOscillator(), og = c.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(110, t);
      o.frequency.exponentialRampToValueAtTime(24, t + 0.9);
      env(c, og, t, 0.01, 1.1, 1.0);
      o.connect(og).connect(c.destination);
      o.start(t); o.stop(t + 1.1);
      // 노이즈 콰쾅
      const n = noise(c), nf = c.createBiquadFilter(), ng = c.createGain();
      nf.type = 'lowpass';
      nf.frequency.setValueAtTime(8000, t);
      nf.frequency.exponentialRampToValueAtTime(120, t + 0.85);
      env(c, ng, t, 0.008, 0.95, 0.95);
      n.connect(nf).connect(ng).connect(c.destination);
      n.start(t); n.stop(t + 1.1);
      // 잔해 후두둑
      for (let i = 0; i < 5; i++) {
        const d = 0.25 + i * rand(0.08, 0.16);
        const o2 = c.createOscillator(), g2 = c.createGain();
        o2.type = 'sine';
        o2.frequency.setValueAtTime(rand(90, 220), t + d);
        o2.frequency.exponentialRampToValueAtTime(40, t + d + 0.07);
        env(c, g2, t + d, 0.004, 0.18, 0.09);
        o2.connect(g2).connect(c.destination);
        o2.start(t + d); o2.stop(t + d + 0.11);
      }
    }
  };
})();

function fxText(parent, x, y, text, size, color, dur = 900) {
  const el = document.createElement('div');
  el.className = 'fx-text';
  el.textContent = text;
  el.style.cssText = `left:${x}px; top:${y}px; font-size:${size}px; color:${color}; animation-duration:${dur}ms;`;
  parent.appendChild(el);
  setTimeout(() => el.remove(), dur + 60);
}

function burstParticles(parent, x, y, emojis, count, speed) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = pick(emojis);
    const size = rand(14, 30);
    el.style.cssText = `left:${x}px; top:${y}px; font-size:${size}px;`;
    parent.appendChild(el);
    const ang = rand(0, Math.PI * 2);
    const v = rand(speed * 0.35, speed);
    let vx = Math.cos(ang) * v, vy = Math.sin(ang) * v - speed * 0.45;
    let px = 0, py = 0, rot = rand(-180, 180), life = 1;
    const tick = () => {
      vy += 0.55; px += vx; py += vy; life -= 0.02; rot += vx * 2;
      el.style.transform = `translate(${px}px, ${py}px) rotate(${rot}deg)`;
      el.style.opacity = Math.max(life, 0);
      if (life > 0) requestAnimationFrame(tick);
      else el.remove();
    };
    requestAnimationFrame(tick);
  }
}

function shake(el, cls) {
  el.classList.remove('shake-s', 'shake-m', 'shake-l');
  void el.offsetWidth;
  el.classList.add(cls);
}

    // 잡는 순간 사직서가 손가락 위치로 이동 (하단 어디서든 바로 스와이프 가능)
    const p = pointerPos(e);
    px = p.x - 37; py = p.y - 48;
    samples.push({ x: p.x, y: p.y, t: performance.now() });
    render();
  }

  function moveDrag(e) {
    if (!dragging) return;
    const p = pointerPos(e);
    px = p.x - 37; py = p.y - 48;
    rot = clamp((p.x - (homeX + 37)) * 0.15, -30, 30);
    samples.push({ x: p.x, y: p.y, t: performance.now() });
    if (samples.length > 6) samples.shift();
    render();
    drawAim();
  }

  function endDrag(e) {
    if (!dragging) return;
    dragging = false;
    cx2d.clearRect(0, 0, canvas.width, canvas.height);
    // 릴리즈 직전 120ms 구간 샘플로 속도 계산 (멈칫해도 플릭 속도가 정확하게)
    if (samples.length >= 2) {
      const end = samples[samples.length - 1];
      let first = samples[samples.length - 2];
      for (let i = samples.length - 2; i >= 0; i--) {
        if (end.t - samples[i].t > 120) break;
        first = samples[i];
      }
      const dt = Math.max(end.t - first.t, 16);
      vx = (end.x - first.x) / dt * 16;
      vy = (end.y - first.y) / dt * 16;
    } else { vx = 0; vy = 0; }
    let speed = Math.hypot(vx, vy);
    if (speed < 6) { resetPaper(); return; } // 너무 약하면 제자리
    if (speed > MAX_SPEED) { vx *= MAX_SPEED / speed; vy *= MAX_SPEED / speed; speed = MAX_SPEED; }
    flying = true;
    throwMode = 'drag';
    projGrav = GRAV;
    strikeTarget = null;
    flightStart = performance.now();
    vrot = (vx * 1.2 + rand(-6, 6)) * (weapon().spin || 1);
    SFX.whoosh(speed / 30);
    fly();
  }

  // 사직서 본체 + 하단 발사 구역 어디서든 잡고 스와이프
  const launchZone = $('#launchZone');
  [paper, launchZone].forEach(el => {
    el.addEventListener('pointerdown', startDrag);
    el.addEventListener('pointermove', moveDrag);
    el.addEventListener('pointerup', endDrag);
    el.addEventListener('pointercancel', endDrag);
  });

  function drawAim() {
    cx2d.clearRect(0, 0, canvas.width, canvas.height);
    if (samples.length < 2) return;
    const a = samples[0], b = samples[samples.length - 1];
    const dx = b.x - a.x, dy = b.y - a.y;
    cx2d.strokeStyle = 'rgba(255,216,61,.7)';
    cx2d.lineWidth = 3;
    cx2d.setLineDash([8, 8]);
    cx2d.beginPath();
    cx2d.moveTo(px + 37, py + 48);
    cx2d.lineTo(px + 37 + dx * 2.2, py + 48 + dy * 2.2);
    cx2d.stroke();
  }

  function fly() {
    if (!flying) return;
    vy += projGrav;
    rot += vrot;

    // 서브스텝 스윕 충돌: 빠른 사직서가 얼굴을 통과(터널링)하지 못하게 이동을 잘게 쪼개 검사
    const speed = Math.hypot(vx, vy);
    const steps = Math.max(1, Math.ceil(speed / 14));
    const r = bossRect();
    for (let i = 0; i < steps; i++) {
      px += vx / steps; py += vy / steps;
      const cx = px + 37, cy = py + 48;
      // 자동 투척은 조준점 도달로, 드래그는 얼굴 영역 진입으로 명중 판정
      const hitNow = strikeTarget
        ? Math.hypot(cx - strikeTarget.x, cy - strikeTarget.y) < 28
        : (cx > r.x && cx < r.x + r.w && cy > r.y && cy < r.y + r.h);
      if (mental > 0 && hitNow) {
        render();
        onHit(speed, cx, cy);
        return;
      }
    }
    render();

    // 화면 밖(아래/좌우) 또는 비행 시간 초과 → 미스
    if (py > screen.clientHeight + 60 || px < -140 || px > screen.clientWidth + 60
        || performance.now() - flightStart > FLIGHT_TIMEOUT) {
      onMiss();
      return;
    }
    requestAnimationFrame(fly);
  }

  function onMiss() {
    flying = false;
    strikeTarget = null;
    SFX.thud();
    if (combo > 0) combo = 0;
    if (mental > 0) { say(pick(MISS_TAUNTS)); setFace('idle'); }
    resetPaper();
  }

  // 명중 공통 처리: 카운트/콤보/멘탈/넉백/KO (사직서·주먹 공용)
  function registerHit(dmg) {
    hits++;
    combo++;
    if (combo > bestCombo) { bestCombo = combo; localStorage.setItem('bestCombo', bestCombo); }
    localStorage.setItem('hitCount', hits);
    clearTimeout(comboTimer);
    comboTimer = setTimeout(() => { combo = 0; }, 3500);
    reportHit();

    // 콤보 보너스는 최대 +60%까지만 — 무한 연타로 데미지가 폭주하지 않게 상한
    mental = clamp(mental - dmg * (1 + Math.min(combo, 20) * 0.03), 0, maxMental);
    localStorage.setItem('mental', mental);
    updateMental();

    if (combo >= 2) SFX.combo(combo);

    // 부장님 얼굴 밀림 (스윙이면 휘두른 방향으로 넉백)
    const kx = knockDir ? knockDir * rand(12, 20) : rand(-14, 14);
    const kr = knockDir ? knockDir * rand(5, 11) : rand(-9, 9);
    knockDir = 0;
    bossHead.style.transition = 'transform .08s';
    bossHead.style.transform = `translate(${kx}px, ${rand(2, 10)}px) rotate(${kr}deg)`;
    setTimeout(() => {
      bossHead.style.transition = 'transform .3s';
      bossHead.style.transform = '';
    }, 90);

    if (mental <= 0) { setTimeout(ko, 500); }
    else setTimeout(() => { if (!flying) setFace('idle'); }, 1100);
  }

  function onHit(speed, hx, hy) {
    flying = false;
    strikeTarget = null;
    const w = weapon();
    const wIdx = WEAPONS.indexOf(w);
    // 티어/데미지: 드래그는 던진 속도 기준, 터치 자동 투척은 무기 기본 데미지
    let tier, dmg;
    const base = rand(w.dmg[0], w.dmg[1]);
    if (throwMode === 'auto') {
      tier = autoCrit ? 2 : 1;
      dmg = base * (autoCrit ? 1.9 : 1);
    } else {
      const isCrit = speed > 46 || (combo >= 4 && speed > 34);
      tier = isCrit ? 2 : speed > 26 ? 1 : 0;
      dmg = base * (tier === 2 ? 2.2 : tier === 1 ? 1.2 : 0.6);
    }
    throwMode = 'drag';

    // 무기별 임팩트 디테일
    if (w.id === 'pen') stickPen(hx, hy);
    const heavy = w.id === 'keyboard' || w.id === 'chair' || w.id === 'brief';

    if (tier === 2) {
      SFX.crit(); SFX.grunt(0.8);
      shake(screen, 'shake-l');
      flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
      fxText(screen, hx, hy - 30, w.critText, 32, '#ff4757');
      burstParticles(screen, hx, hy, ['💥', '⭐', '💢', w.emoji], 14, 13);
      setFace('dizzy');
      say(pick(HIT_CRIT), 1500);
      vibrate([60, 40, 80]);
      addCider(2);
    } else if (tier === 1) {
      SFX.hit(1.1 + wIdx * 0.15); SFX.grunt(1);
      shake(screen, heavy ? 'shake-l' : 'shake-m');
      fxText(screen, hx, hy - 26, w.hitText, 28, '#ffd83d');
      burstParticles(screen, hx, hy, ['💢', '💦', w.emoji], 8, 9);
      setFace('hit');
      if (Math.random() < 0.6) say(pick(HIT_MID), 1300);
      vibrate(50);
      addCider(1);
    } else {
      SFX.hit(0.6);
      shake(screen, 'shake-s');
      fxText(screen, hx, hy - 22, '톡', 20, '#cfd3ec');
      burstParticles(screen, hx, hy, ['💦', w.emoji], 4, 6);
      setFace('hit');
      say(pick(HIT_WEAK), 1200);
      vibrate(25);
      addCider(1);
    }

    registerHit(dmg);
    resetPaper();
  }

  // 볼펜이 얼굴에 꽂히는 연출
  function stickPen(x, y) {
    const el = document.createElement('div');
    el.className = 'stuck-pen';
    el.textContent = '🖊️';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    screen.appendChild(el);
    setTimeout(() => el.remove(), 900);
  }

  // 권총 탄환 트레이서
  function tracer(x1, y1, x2, y2) {
    const el = document.createElement('div');
    const len = Math.hypot(x2 - x1, y2 - y1);
    const ang = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
    el.className = 'tracer';
    el.style.cssText = `left:${x1}px; top:${y1}px; width:${len}px; transform: rotate(${ang}deg);`;
    screen.appendChild(el);
    setTimeout(() => el.remove(), 200);
  }

  /* ── 터치 자동 투척: 부장님을 터치하면 장착 무기가 그 지점으로 날아감 ── */
  let lastStrike = 0, strikeChain = 0, strikeChainTimer = null;

  bossWrap.addEventListener('pointerdown', e => {
    if (dragging || mental <= 0) return;
    const now = performance.now();
    if (now - lastStrike < 130) return; // 이벤트 스팸 방지 (연타는 허용)
    lastStrike = now;
    e.preventDefault();
    throwHintEl.style.display = 'none';
    const p = pointerPos(e);
    weaponStrike(p.x, p.y);
  });

  function weaponStrike(tx, ty) {
    const w = weapon();
    strikeChain++;
    clearTimeout(strikeChainTimer);
    strikeChainTimer = setTimeout(() => strikeChain = 0, 900);
    autoCrit = (strikeChain >= 5 && strikeChain % 5 === 0) || Math.random() < 0.12;

    // 어디를 터치해도 얼굴을 향해 날아가도록 조준점을 얼굴 판정 영역 안으로 클램프
    const fr = bossRect();
    tx = clamp(tx, fr.x + 24, fr.x + fr.w - 24);
    ty = clamp(ty, fr.y + 30, fr.y + fr.h - 24);

    // 권총: 즉발 — 트레이서와 총성, 투사체는 손에 그대로
    if (w.flight === 'shot') {
      SFX.gunshot();
      tracer(homeX + 37, homeY + 30, tx, ty);
      fxText(screen, homeX + 37, homeY - 6, '💥', 22, '#ffd83d'); // 머즐 플래시
      throwMode = 'auto';
      onHit(50, tx, ty);
      return;
    }

    // 근접 스윙: 몽둥이는 옆에서 풀스윙, 키보드는 머리 위에서 휘둘러 내리찍기
    if (w.flight === 'swing') {
      const impactDelay = w.swing === 'side' ? 150 : 185; // 스윙 궤적의 임팩트 지점 타이밍
      SFX.whoosh(1.4);
      swingFx(w, tx, ty);
      setTimeout(() => {
        if (mental <= 0) return;
        throwMode = 'auto';
        knockDir = w.swing === 'side' ? -1 : 0;
        onHit(50, tx, ty);
      }, impactDelay);
      return;
    }

    if (flying) return; // 투사체는 한 번에 하나
    flying = true;
    throwMode = 'auto';
    flightStart = performance.now();

    if (w.flight === 'dart') {
      // 볼펜: 어디를 노리든 정수리를 향해 직선으로 날아가 꽂힌다
      tx = fr.x + fr.w / 2 + rand(-16, 16);
      ty = fr.y + fr.h * 0.18 + rand(-6, 6);
      px = homeX; py = homeY;
      const dx = tx - (px + 37), dy = ty - (py + 48), d = Math.hypot(dx, dy) || 1;
      vx = dx / d * 55; vy = dy / d * 55; projGrav = 0.05;
      rot = Math.atan2(dy, dx) * 180 / Math.PI + 45; vrot = 0;
    } else {
      // 투척(사직서/의자/가방): 손에서 목표로 빠른 포물선
      px = homeX; py = homeY;
      const dx = tx - (px + 37), dy = ty - (py + 48), d = Math.hypot(dx, dy) || 1;
      const s = 40;
      vx = dx / d * s; vy = dy / d * s - 3; projGrav = 0.3;
      vrot = (w.spin || 1) * 14 * (Math.random() < 0.5 ? -1 : 1);
    }
    strikeTarget = { x: tx, y: ty }; // 조준점 도달 시 명중
    SFX.whoosh(1 + WEAPONS.indexOf(w) * 0.08);
    render();
    fly();
  }

  // 근접 스윙 연출 (몽둥이/키보드)
  function swingFx(w, x, y) {
    const el = document.createElement('div');
    el.className = w.swing === 'side' ? 'swing-side' : 'swing-smash';
    el.textContent = w.emoji;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    screen.appendChild(el);
    setTimeout(() => el.remove(), 420);
  }

  // 장착 무기에 따라 투사체 비주얼 교체 (사직서 ↔ 무기 이모지)
  function updateProjectile() {
    const w = weapon();
    const isPaper = w.id === 'fist';
    $('#paperSvg').style.display = isPaper ? '' : 'none';
    const em = $('#paperEmoji');
    em.style.display = isPaper ? 'none' : 'flex';
    em.textContent = w.emoji;
    em.style.fontSize = (w.size || 56) + 'px';
  }

  /* ── 전국 타격 집계 ──
     서버(counterapi.dev)에는 연타 게임 특성상 10대를 모아 카운터 +1 (API 스팸 방지).
     화면 표시는 서버 커밋분(10단위) + 내 미커밋 타격(0~9)을 합쳐 매 타격 1씩 오른다. */
  const HIT_BATCH = 10;
  let pendingHits = +(localStorage.getItem('pendingHits') || 0);
  let natHitUnits = null, natHitters = null;
  const natHitTotal = () => (natHitUnits || 0) * HIT_BATCH + pendingHits;

  function reportHit() {
    pendingHits++;
    if (pendingHits >= HIT_BATCH) {
      pendingHits -= HIT_BATCH;
      if (natHitUnits !== null) natHitUnits++; // 서버 응답 전 낙관적 반영 → 표시 숫자가 잠깐 줄지 않게
      apiCount('hits-' + kstDay(), true).then(c => { natHitUnits = c; updateNatHud(); }).catch(() => {});
    }
    localStorage.setItem('pendingHits', pendingHits);
    // 오늘 처음 팬 사람이면 참여자 +1
    const d = kstDay();
    if (localStorage.getItem('hitJoinedDay') !== d) {
      localStorage.setItem('hitJoinedDay', d);
      apiCount('hitters-' + d, true).then(c => { natHitters = c; updateNatHud(); }).catch(() => {});
    }
    updateNatHud(); // 매 타격마다 표시 숫자를 1씩 올린다
  }

  async function fetchNatStats() {
    try {
      const d = kstDay();
      const [h, p] = await Promise.all([apiCount('hits-' + d), apiCount('hitters-' + d)]);
      natHitUnits = h; natHitters = p;
    } catch (e) { /* 오프라인이면 마지막 값 유지 */ }
    updateNatHud();
  }

  function updateNatHud() {
    natHitsEl.textContent = natHitUnits === null ? '…' : fmt(natHitTotal());
    if ($('#natOverlay').classList.contains('show')) renderNatPanel();
  }

  function renderNatPanel() {
    $('#natLineT').innerHTML = natHitUnits === null
      ? '전국 집계 서버 연결 중… 📡'
      : `오늘 전국 직장인 <b>${fmt(natHitters)}</b>명이<br>상사를 <b>${fmt(natHitTotal())}</b>번 팼습니다`;
    $('#natMine').innerHTML = `내 누적 타격 <b>${fmt(hits)}회</b> · 최고 콤보 <b>${fmt(bestCombo)}</b>`;
  }

  $('#natBtn').addEventListener('click', () => {
    renderNatPanel();
    $('#natOverlay').classList.add('show');
    fetchNatStats();
    Track('nat_stats_opened', { total_hits: hits });
  });
  $('#natClose').addEventListener('click', () => $('#natOverlay').classList.remove('show'));
  $('#natOverlay').addEventListener('pointerdown', e => {
    if (e.target === $('#natOverlay')) $('#natOverlay').classList.remove('show');
  });

  function updateMental() {
    mentalFillEl.style.width = (mental / maxMental * 100) + '%';
    mentalNumEl.textContent = Math.ceil(mental) + ' / ' + maxMental;
  }

  function ko() {
    SFX.fanfare();
    setFace('ko');
    const reward = 50 + (bossLevel - 1) * 20; // 위로금: 세대가 높을수록 두둑하게
    addCider(reward);
    Track('boss_ko', { level: bossLevel, weapon: equipId, total_hits: hits });
    bossWrap.style.transition = 'transform .8s';
    bossWrap.style.transform = 'translateX(-50%) translateY(30px) rotate(90deg)';
    burstParticles(screen, screen.clientWidth / 2, screen.clientHeight * 0.35, ['🎉', '⭐', '💫', '🥤', '💰'], 22, 12);
    vibrate([80, 60, 80, 60, 150]);
    // 흐름 안 끊기게 오버레이 없이 연출만 띄우고 자동으로 다음 부장님 출근
    setTimeout(() => {
      const cw = screen.clientWidth, ch = screen.clientHeight;
      fxText(screen, cw / 2, ch * 0.3, 'K.O.!', 62, '#ffd83d', 1500);
      fxText(screen, cw / 2, ch * 0.44, pick(KO_SUBS).split('\n')[0], 17, '#dfe3ff', 1500);
      fxText(screen, cw / 2, ch * 0.54, `위로금 +${fmt(reward)} 🥤`, 24, '#7bffb2', 1500);
    }, 400);
    setTimeout(nextBoss, 2000);
  }

  function nextBoss() {
    bossLevel++;
    maxMental = mentalCap(bossLevel); // 세대가 바뀔수록 멘탈이 단단한 부장님 등장
    mental = maxMental;
    localStorage.setItem('bossLevel', bossLevel);
    localStorage.setItem('mental', mental);
    updateMental();
    $('#mentalLabel').textContent = `상사 멘탈 (${bossLevel}대째)`;
    bossWrap.style.transition = 'transform .4s';
    bossWrap.style.transform = 'translateX(-50%)';
    setFace('idle');
    say(`신임 부장이다. 멘탈 ${maxMental}짜리지. 잘 부탁해~ 참, 오늘 야근이야.`, 2500);
  }

  /* ── 상점 UI ── */
  function renderShop() {
    const list = $('#shopList');
    list.innerHTML = '';
    WEAPONS.forEach(w => {
      const isOwned = owned.includes(w.id);
      const isEquipped = equipId === w.id;
      const row = document.createElement('div');
      row.className = 'shop-item' + (isEquipped ? ' equipped' : '');
      row.innerHTML = `
        <div class="si-emoji">${w.emoji}</div>
        <div class="si-info">
          <div class="si-name">${w.name} <span class="si-dmg">DMG ${w.dmg[0]}~${w.dmg[1]}</span></div>
          <div class="si-desc">${w.desc}</div>
        </div>`;
      const btn = document.createElement('button');
      btn.className = 'si-btn';
      if (isEquipped) { btn.textContent = '장착중'; btn.classList.add('equipped'); btn.disabled = true; }
      else if (isOwned) { btn.textContent = '장착'; btn.classList.add('own'); }
      else { btn.textContent = fmt(w.price) + ' 🥤'; if (cider < w.price) btn.classList.add('cant'); }
      btn.addEventListener('click', () => {
        if (isOwned) {
          equipId = w.id;
          saveShop();
          updateProjectile();
          Track('weapon_equipped', { weapon: w.id });
          SFX.combo(4);
          renderShop();
        } else if (cider >= w.price) {
          cider -= w.price;
          owned.push(w.id);
          equipId = w.id;
          saveShop();
          Track('weapon_purchased', {
            weapon: w.id, weapon_name: w.name, price: w.price,
            rank: WEAPONS.indexOf(w),          // 상점 진행도: 1(볼펜)~6(서류가방)
            weapons_owned: owned.length,        // 지금까지 보유한 무기 수
            reached_final: w.id === WEAPONS[WEAPONS.length - 1].id, // 최종 무기 도달 여부
            boss_level: bossLevel,
          });
          updateProjectile();
          updateCider();
          SFX.buy();
          vibrate(40);
          fxText($('#shopPanel'), $('#shopPanel').clientWidth / 2, 60, `${w.emoji} ${w.name} 획득!`, 22, '#ffd83d');
          renderShop();
        } else {
          SFX.thud();
          fxText($('#shopPanel'), $('#shopPanel').clientWidth / 2, 60, '사이다가 부족합니다 😢', 16, '#ff8a94');
        }
      });
      row.appendChild(btn);
      list.appendChild(row);
    });
  }

  $('#shopBtn').addEventListener('click', () => {
    renderShop();
    updateCider();
    $('#shopOverlay').classList.add('show');
    Track('shop_opened', { cider });
  });
  $('#shopClose').addEventListener('click', () => $('#shopOverlay').classList.remove('show'));
  $('#shopOverlay').addEventListener('pointerdown', e => {
    if (e.target === $('#shopOverlay')) $('#shopOverlay').classList.remove('show');
  });

  window.addEventListener('resize', layout);
  layout();
  setFace('idle');
  updateMental();
  updateCider();
  updateProjectile();
  fetchNatStats();
  setInterval(fetchNatStats, 30000); // HUD의 전국 타격 수를 준실시간으로 갱신
  if (bossLevel > 1) $('#mentalLabel').textContent = `상사 멘탈 (${bossLevel}대째)`;

  return { layout };
})();

/* ═══════════════════ 게임 2: 회사 폭파 ═══════════════════ */
const Boom = (() => {
  const screen = $('#boomScreen');
  const building = $('#mainBuilding');
  const rubble = $('#rubble');
  const btn = $('#quitBtn');
  const boomFlash = $('#boomFlash');

  let myCount = +(localStorage.getItem('boomCount') || 0);
  let rebuilding = false;
  let rapidClicks = 0, rapidTimer = null;

  // 창문 생성 (일부는 야근 중이라 불 켜짐)
  (() => {
    const g = $('#windows');
    for (let row = 0; row < 8; row++) {
      for (let col = 0; col < 4; col++) {
        const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        r.setAttribute('x', 92 + col * 30);
        r.setAttribute('y', 84 + row * 27);
        r.setAttribute('width', 20);
        r.setAttribute('height', 17);
        r.setAttribute('rx', 2);
        r.setAttribute('fill', Math.random() < 0.55 ? '#ffe082' : '#222b4d');
        g.appendChild(r);
      }
    }
  })();

  /* 전국 통계 (공통 유틸의 counterapi.dev 카운터 사용) */
  let natPeople = null, natBooms = null;

  async function fetchStats() {
    try {
      const d = kstDay();
      const [b, p] = await Promise.all([apiCount('booms-' + d), apiCount('people-' + d)]);
      natBooms = b; natPeople = p;
    } catch (e) { /* 오프라인이면 마지막 값 유지 */ }
    renderStats();
  }

  // 폭파 1회 = 전국 카운트 +1, 오늘 첫 폭파면 참여자 +1
  function reportBoom() {
    const d = kstDay();
    apiCount('booms-' + d, true).then(c => { natBooms = c; renderStats(); }).catch(() => {});
    if (localStorage.getItem('joinedDay') !== d) {
      localStorage.setItem('joinedDay', d);
      apiCount('people-' + d, true).then(c => { natPeople = c; renderStats(); }).catch(() => {});
    }
  }

  function renderStats() {
    $('#natLine').innerHTML = natBooms === null
      ? '전국 집계 서버 연결 중… 📡'
      : `오늘 전국 직장인 <b>${fmt(natPeople)}</b>명이<br>회사를 <b>${fmt(natBooms)}</b>번 파괴했습니다`;
    $('#myLine').innerHTML = `내 파괴 횟수: <b>${fmt(myCount)}회</b> ${title(myCount)}`;
  }

  function title(n) {
    if (n >= 500) return '· 칭호: 퇴사神 👑';
    if (n >= 200) return '· 칭호: 파괴왕 💀';
    if (n >= 100) return '· 칭호: 폭파반장 🧨';
    if (n >= 50) return '· 칭호: 상습퇴사범 🚨';
    if (n >= 10) return '· 칭호: 퇴사꿈나무 🌱';
    return '';
  }

  const BOOM_MSGS = [
    '사표는 원래 품에 넣고 다니는 것',
    '속이 다 시원~하다!',
    '내일은 더 세게 터뜨릴 수 있어',
    '월요일도 함께 폭파해 드립니다',
    '야근 수당은 챙기고 터뜨리셨나요?',
    '상쾌한 퇴사의 맛 🍹',
    '회사는 내일 아침 자동 재건축됩니다',
    '부장님은 안전하게 대피했습니다 (아쉽)',
  ];
  const MILESTONES = { 10: '🌱 퇴사꿈나무 달성!', 50: '🚨 상습퇴사범 달성!', 100: '🧨 폭파반장 달성!', 200: '💀 파괴왕 달성!', 500: '👑 퇴사神 달성!!' };

  btn.addEventListener('click', () => {
    if (rebuilding) return;
    explode();
  });

  function explode() {
    rebuilding = true;
    myCount++;
    localStorage.setItem('boomCount', myCount);
    reportBoom();

    // 연타 카운트
    rapidClicks++;
    clearTimeout(rapidTimer);
    rapidTimer = setTimeout(() => rapidClicks = 0, 4000);

    SFX.explosion();
    vibrate([100, 50, 200]);
    shake(screen, 'shake-l');
    boomFlash.classList.remove('go'); void boomFlash.offsetWidth; boomFlash.classList.add('go');

    const cw = $('#cityWrap').getBoundingClientRect();
    const sr = screen.getBoundingClientRect();
    const cx = cw.left - sr.left + cw.width / 2;
    const cy = cw.top - sr.top + cw.height / 2;
    burstParticles(screen, cx, cy, ['💥', '🔥', '🧱', '💸', '📊', '🪑', '💻', '📁'], 26, 16);
    burstParticles(screen, cx, cy - 40, ['💥', '🔥', '💨'], 10, 10);
    fxText(screen, cx, cy - 60, pick(['콰콰쾅!!!', '펑!!!', '두두둥!!!']), 40, '#ffd83d');

    building.style.transition = 'transform .18s, opacity .3s';
    building.style.transform = 'scale(1.06)';
    setTimeout(() => {
      building.style.transform = 'scale(.2) translateY(200px)';
      building.style.opacity = '0';
      rubble.style.display = '';
    }, 160);

    renderStats();
    $('#comboBoomText').textContent = rapidClicks >= 3
      ? `🔥 ${rapidClicks}연속 폭파 중! 화력이 미쳤다!!`
      : pick(BOOM_MSGS);

    if (MILESTONES[myCount]) {
      setTimeout(() => {
        SFX.fanfare();
        const m = $('#milestone');
        m.textContent = MILESTONES[myCount];
        m.classList.remove('show'); void m.offsetWidth; m.classList.add('show');
        burstParticles(screen, screen.clientWidth / 2, screen.clientHeight * 0.3, ['🎉', '👑', '⭐'], 18, 12);
      }, 700);
    }

    // 재건축
    setTimeout(() => {
      rubble.style.display = 'none';
      building.style.transition = 'transform .5s cubic-bezier(.2,1.6,.4,1), opacity .3s';
      building.style.transform = 'scale(1)';
      building.style.opacity = '1';
      SFX.combo(3);
      rebuilding = false;
    }, 1400);
  }

  // 회사 폭파 게임은 추후 별도 개발 예정 — 화면이 숨겨져 있는 동안 집계 폴링도 중단
  // renderStats();
  // fetchStats();
  // setInterval(fetchStats, 20000);

  return {};
})();
</script>
</body>
</html>
